<!DOCTYPE html>
<html>
<head>

    <title>Responsive Webpage</title>

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>

        /* Media Query for Mobile */

        @media (max-width:600px) {
            
            body {
                background-color: lightyellow;
            }

            h1 {
                font-size: 20px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <h1 class="text-center my-4">Responsive Webpage Example</h1>

        <div class="row">

            <div class="col-md-4 bg-primary text-white p-3 text-center">
                Column 1
            </div>

            <div class="col-md-4 bg-success text-white p-3 text-center">
                Column 2
            </div>

            <div class="col-md-4 bg-danger text-white p-3 text-center">
                Column 3
            </div>

        </div>

    </div>

</body>
</html>
