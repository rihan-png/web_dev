<!DOCTYPE html>
<html>
<head>
<title>CSS Types Example</title>

<!-- Internal CSS -->
<style>
body{
background-color: lightyellow;
}

h2{
color: green;
text-align: center;
}

p{
font-size:18px;
font-family: Arial;
color: blue;
}
</style>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 style="color:red;">Welcome to Web Development</h1>  <!-- Inline CSS -->

<h2>Internal CSS Example</h2>

<p>This paragraph is styled using Internal CSS.</p>

<h3>External CSS Example</h3>

<p class="external">This paragraph is styled using External CSS.</p>

</body>
